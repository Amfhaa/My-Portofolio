<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masih Dipencet 😭</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fade 1s ease;
    }

    img {
      width: 220px;
      max-width: 80%;
      margin-bottom: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 2rem;
      margin: 0;
    }

    p {
      opacity: 0.8;
      margin-top: 10px;
      font-size: 1rem;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="melet.jpg" alt="gambar lucu">

    <h1>Dibilang websitenya belom jadi 😭</h1>
    <p>Masih aja dipencet...</p>
  </div>
</body>
</html>
