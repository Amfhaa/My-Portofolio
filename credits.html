<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credits - Alfa.</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for Neo-Brutalism -->
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0e; /* Deep retro black background */
            --card-bg: #17171c; /* Elegant charcoal/gray card bg */
            --text-color: #fdfbf7;
            --primary-yellow: #FEE440;
            --primary-pink: #F72585;
            --primary-blue: #4361EE;
            --border-color: #0f0f0f;
            --border-width: 4px;
            --shadow-color: #000000;
            --shadow-offset: 8px;
            --font-heading: 'Bricolage Grotesque', sans-serif;
            --font-body: 'Space Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            /* Dark grey dots pattern on black background */
            background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
            color: var(--text-color);
            font-family: var(--font-body);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 24px; /* Increased top padding to prevent element cut-offs */
            overflow-x: hidden;
            position: relative;
        }

        /* Noise Overlay (matches main page) */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Neo-Brutalist Credits Container */
        .credits-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border: var(--border-width) solid var(--border-color);
            border-radius: 16px;
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--shadow-color);
            padding: 40px;
            position: relative;
            z-index: 2;
            transform: rotate(-1deg);
            transition: transform 0.3s ease;
        }

        .credits-container:hover {
            transform: rotate(0deg);
        }

        /* Title with absolute-positioned sticker */
        .title-section {
            margin-bottom: 30px;
            position: relative;
        }

        .credits-title {
            font-family: var(--font-heading);
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--text-color);
            line-height: 1.1;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* Decorative sticker (Moved downward slightly to prevent viewport cropping) */
        .sticker {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: var(--primary-pink);
            color: white;
            padding: 6px 12px;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1rem;
            border: 3px solid var(--border-color);
            border-radius: 4px;
            box-shadow: 3px 3px 0px var(--shadow-color);
            transform: rotate(12deg);
            user-select: none;
        }

        .credits-desc {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 24px;
            border-bottom: 2px dashed rgba(255, 255, 255, 0.15);
            padding-bottom: 16px;
        }

        /* List of Credits */
        .credits-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .credit-item {
            background-color: #24242d;
            border: 3px solid var(--border-color);
            border-radius: 10px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 4px 4px 0px var(--shadow-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .credit-item:hover {
            transform: translate(-3px, -3px);
            box-shadow: 7px 7px 0px var(--shadow-color);
            background-color: #2a2a35;
        }

        .credit-label {
            font-weight: 700;
            color: var(--primary-yellow);
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .credit-link {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s ease, padding-left 0.2s ease;
            position: relative;
            padding: 4px 8px;
            border-radius: 4px;
            border: 2px solid transparent;
        }

        .credit-link::before {
            content: "✦";
            opacity: 0;
            transform: scale(0);
            transition: opacity 0.2s ease, transform 0.2s ease;
            color: var(--primary-pink);
        }

        .credit-link:hover {
            color: #0f0f0f;
            background-color: var(--primary-pink);
            border-color: var(--border-color);
        }

        .credit-link:hover::before {
            opacity: 1;
            transform: scale(1);
            color: #0f0f0f;
        }

        /* Back Button */
        .back-btn-container {
            display: flex;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.1rem;
            text-decoration: none;
            color: #0f0f0f;
            background-color: var(--primary-yellow);
            border: var(--border-width) solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--shadow-color);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
        }

        .btn:hover {
            transform: translate(-3px, -3px);
            box-shadow: 11px 11px 0px var(--shadow-color);
            background-color: var(--primary-blue);
            color: white;
        }

        .btn:active {
            transform: translate(4px, 4px) !important;
            box-shadow: calc(var(--shadow-offset) - 4px) calc(var(--shadow-offset) - 4px) 0px var(--shadow-color) !important;
        }

        .btn svg {
            transition: transform 0.2s ease;
        }

        .btn:hover svg {
            transform: translateX(-4px);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .credits-container {
                padding: 24px 20px;
                border-width: 3px;
            }

            .credits-title {
                font-size: 2.5rem;
            }

            .sticker {
                top: -15px;
                right: -5px;
                font-size: 0.8rem;
                padding: 4px 8px;
            }

            .credit-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                padding: 12px 14px;
            }

            .credit-link {
                align-self: flex-end;
                font-size: 0.85rem;
            }

            .btn {
                width: 100%;
                justify-content: center;
                font-size: 1rem;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>

    <div class="credits-container">
        <!-- English Decorative sticker -->
        <div class="sticker">RESOURCES</div>

        <div class="title-section">
            <h1 class="credits-title">CREDITS</h1>
            <p class="credits-desc">List of assets, libraries, and resources utilized in the making of this website.</p>
        </div>

        <ul class="credits-list">
            <!-- Credit Item 1 -->
            <li class="credit-item">
                <span class="credit-label">MUSIC</span>
                <a href="https://www.youtube.com/watch?v=-D1kJncUruo&list=PLPBrp0Wr_HK9Sx4hh30feKyt6eSlEh3Zv&index=6" target="_blank" rel="noopener noreferrer" class="credit-link">www.youtube.com</a>
            </li>
            
            <!-- Credit Item 2 -->
            <li class="credit-item">
                <span class="credit-label">CODE</span>
                <a href="https://antigravity.google" target="_blank" rel="noopener noreferrer" class="credit-link">antigravity.google</a>
            </li>

            <!-- Credit Item 3 -->
            <li class="credit-item">
                <span class="credit-label">ANIMATION</span>
                <a href="https://animejs.com" target="_blank" rel="noopener noreferrer" class="credit-link">animejs.com</a>
            </li>

            <!-- Credit Item 4 -->
            <li class="credit-item">
                <span class="credit-label">FONTS</span>
                <a href="https://fonts.google.com/specimen/Bricolage+Grotesque?preview.script=Latn" target="_blank" rel="noopener noreferrer" class="credit-link">fonts.google.com</a>
            </li>

            <!-- Credit Item 5 -->
            <li class="credit-item">
                <span class="credit-label">BACKGROUND VIDEO</span>
                <a href="https://id.pinterest.com/pin/989454980639095740/" target="_blank" rel="noopener noreferrer" class="credit-link">pinterest.com</a>
            </li>


            <li class="credit-item">
                <span class="credit-label">CAT IMAGE</span>
                <a href="https://id.pinterest.com/pin/183099541096892845/" target="_blank" rel="noopener noreferrer" class="credit-link">pinterest.com</a>
            </li>

        </ul>

        <div class="back-btn-container">
            <a href="index.html" class="btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                <span>Back To Home</span>
            </a>
        </div>
    </div>

    <!-- Floating Music Controller (Hidden in terminal screen, pops up in hero page) -->
    <div id="music-control-container" class="music-control-container">
        <button id="music-toggle-btn" class="music-toggle-btn playing" aria-label="Toggle Music">
            <span class="music-icon-wrapper">
                <svg class="speaker-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path class="sound-wave wave-1" d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    <path class="sound-wave wave-2" d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                </svg>
            </span>
            <span class="music-status-text" data-i18n="music-on">MUSIK: NYALA</span>
            <span class="retro-visualizer">
                <span class="bar bar-1"></span>
                <span class="bar bar-2"></span>
                <span class="bar bar-3"></span>
            </span>
        </button>
    </div>

    <!-- Audio Element -->
    <audio id="backsound-audio" src="backsound.mp3" loop></audio>

    <!-- Anime.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
